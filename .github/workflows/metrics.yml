name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  # push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Metrics — Header
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: Europe/Lisbon
           # Only the header section (drops repos, community, activity, metadata)
          base: header
          filename: metrics.svg
          repositories_skipped: anamsmartins, anamsmartins/anamsmartins
          committer_message: "Daily Metrics Update"
          extras_js: |
            // Remove name + avatar
            document.querySelector("h1")?.remove()
            // Remove "Joined GitHub..." and "Followed by..." rows
            document.querySelectorAll(".field").forEach(el => {
              const text = el.textContent?.trim() ?? ""
              if (text.startsWith("Joined") || text.startsWith("Followed by")) {
                el.remove()
              }
            })
            // Remove the whole repositories / sponsors block (if still present)
            document.querySelector("section.largeable")?.remove()
            // Remove empty left column left over from the two-column header layout
            document.querySelectorAll(".row > section").forEach(section => {
              if (!section.querySelector(".field")) section.remove()
            })
          extras_css: |
            .items-wrapper,
            .items-wrapper section,
            .items-wrapper .row,
            .items-wrapper .row section {
              margin: 0 !important;
              padding: 0 !important;
            }
            .items-wrapper {
              width: 100%;
              display: flex;
              flex-direction: column;
            }
            .items-wrapper .calendar.field {
              margin: 0 !important;
              padding: 0 !important;
            }
            .items-wrapper .calendar svg {
              width: 100%;
              height: 28px;
              margin: 0 !important;
            }
            .items-wrapper section > .field {
              margin-left: 0 !important;
              margin-right: 0 !important;
            }
            .items-wrapper .field {
              font-size: 15px;
              margin: 0 !important;
              padding: 0 !important;
            }
            .items-wrapper .field svg {
              margin: 0 8px 0 0 !important;
            }

          