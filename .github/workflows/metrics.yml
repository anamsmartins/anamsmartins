name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  # push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
           # Only the header section (drops repos, community, activity, metadata)
          base: header
          extras_js: |
            // Remove name + avatar
            document.querySelector("h1")?.remove()
            // Remove "Joined GitHub..." and "Followed by..." rows
            document.querySelectorAll(".field").forEach(el => {
              const text = el.textContent?.trim() ?? ""
              if (text.startsWith("Joined") || text.startsWith("Followed by")) {
                el.remove()
              }
            })
            // Remove the whole repositories / sponsors block (if still present)
            document.querySelector("section.largeable")?.remove()
          extras_css: |
            .items-wrapper {
              width: 100%;
              display: flex;
              flex-direction: column;
            }
            .items-wrapper .calendar svg {
              width: 100%;
              height: 28px;
            }
            .items-wrapper .field {
              font-size: 15px;
              margin: 0;
            }

          